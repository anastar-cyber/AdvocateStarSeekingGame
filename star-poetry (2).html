<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Star Poetry</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #03050e; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Cormorant Garamond', Georgia, serif; }
canvas { display: block; position: absolute; top: 0; left: 0; }

.float-word {
  position: absolute;
  pointer-events: none;
  font-style: italic;
  font-size: 1.1rem;
  color: #f0e0a0;
  text-shadow: 0 0 14px rgba(240,224,160,0.9);
  white-space: nowrap;
  z-index: 10;
  transform: translateX(-50%);
  animation: rise 1.8s ease forwards;
}
@keyframes rise {
  0%   { opacity:0; transform:translateX(-50%) translateY(0); }
  15%  { opacity:1; }
  80%  { opacity:1; transform:translateX(-50%) translateY(-40px); }
  100% { opacity:0; transform:translateX(-50%) translateY(-55px); }
}

#hint {
  position: absolute;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%);
  font-style: italic; font-size: 0.9rem;
  color: rgba(200,188,155,0.45);
  letter-spacing: 0.07em;
  pointer-events: none; white-space: nowrap; z-index: 10;
}

#counter {
  position: absolute;
  top: 1.4rem; right: 1.8rem;
  font-style: italic; font-size: 0.8rem;
  color: rgba(200,188,155,0.3);
  letter-spacing: 0.1em; z-index: 10;
}

#poem-title {
  position: absolute;
  top: 1.4rem; left: 1.8rem;
  font-style: italic; font-size: 0.8rem;
  color: rgba(200,188,155,0.3);
  letter-spacing: 0.1em; z-index: 10;
  max-width: 50vw;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#collection-btn {
  position: absolute;
  bottom: 1.4rem; right: 1.8rem;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic; font-size: 0.8rem;
  color: rgba(200,148,58,0.4);
  letter-spacing: 0.1em; z-index: 10;
  background: none; border: none; cursor: pointer;
  transition: color 0.25s;
}
#collection-btn:hover { color: rgba(200,148,58,0.85); }
#collection-btn .badge {
  display: inline-block;
  margin-left: 0.4em;
  background: rgba(200,148,58,0.18);
  border: 1px solid rgba(200,148,58,0.3);
  border-radius: 20px;
  padding: 0 0.5em;
  font-size: 0.75rem;
  color: rgba(200,148,58,0.55);
}

#overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(3,5,14,0);
  pointer-events: none;
  transition: background 1.2s ease;
  z-index: 20;
}
#overlay.active { background: rgba(3,5,14,0.88); pointer-events: all; }

#poem-box {
  text-align: center;
  opacity: 0; transform: translateY(18px);
  transition: opacity 0.9s ease 0.6s, transform 0.9s ease 0.6s;
  max-width: min(700px, 88vw);
}
#overlay.active #poem-box { opacity: 1; transform: translateY(0); }

.pline {
  font-size: clamp(1.0rem, 2.4vw, 1.4rem);
  line-height: 2.1;
  color: rgba(228,218,192,0.9);
  letter-spacing: 0.03em;
  opacity: 0; transition: opacity 0.8s ease;
}
.pline.show { opacity: 1; }
.pline em { color: #f0c84a; font-style: italic; }

#poem-attribution {
  margin-top: 1.1rem;
  font-style: italic; font-size: 0.78rem;
  color: rgba(200,188,155,0.28);
  letter-spacing: 0.12em;
  opacity: 0; transition: opacity 0.8s ease 3.2s;
}
#overlay.active #poem-attribution { opacity: 1; }

#btn-row {
  margin-top: 1.8rem;
  display: flex; gap: 1rem; justify-content: center; align-items: center;
  flex-wrap: wrap;
}

#btn-next, #btn-collection-from-poem {
  display: inline-block;
  padding: 0.45rem 1.7rem;
  background: none;
  border: 1px solid rgba(200,148,58,0.35);
  color: rgba(200,148,58,0.6);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic; font-size: 0.9rem;
  letter-spacing: 0.1em; cursor: pointer;
  opacity: 0; transition: opacity 0.8s ease 2.4s, background 0.2s, color 0.2s;
}
#overlay.active #btn-next,
#overlay.active #btn-collection-from-poem { opacity: 1; }
#btn-next:hover, #btn-collection-from-poem:hover {
  background: rgba(200,148,58,0.1); color: rgba(200,148,58,1);
}

#collection-panel {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(3,5,14,0);
  pointer-events: none;
  transition: background 0.8s ease;
  z-index: 30;
}
#collection-panel.open {
  background: rgba(3,5,14,0.94);
  pointer-events: all;
}

#collection-inner {
  width: min(760px, 90vw);
  max-height: 80vh;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
  display: flex; flex-direction: column;
}
#collection-panel.open #collection-inner { opacity: 1; transform: translateY(0); }

#collection-header {
  display: flex; align-items: baseline; justify-content: space-between;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(200,188,155,0.12);
  margin-bottom: 1.4rem;
}
#collection-header h2 {
  font-weight: 300; font-style: italic;
  font-size: clamp(1.3rem, 2.8vw, 1.7rem);
  color: rgba(228,218,192,0.7);
  letter-spacing: 0.08em;
}
#btn-close-collection, #btn-seek-from-collection {
  background: none; border: none; cursor: pointer;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic; font-size: 0.85rem;
  color: rgba(200,148,58,0.5); letter-spacing: 0.1em;
  transition: color 0.2s;
}
#btn-close-collection:hover, #btn-seek-from-collection:hover { color: rgba(200,148,58,1); }

#collection-scroll {
  overflow-y: auto; flex: 1; padding-right: 0.5rem;
  scrollbar-width: thin;
  scrollbar-color: rgba(200,148,58,0.2) transparent;
}
#collection-scroll::-webkit-scrollbar { width: 3px; }
#collection-scroll::-webkit-scrollbar-thumb { background: rgba(200,148,58,0.2); border-radius: 2px; }

.collection-entry {
  padding: 1.3rem 0;
  border-bottom: 1px solid rgba(200,188,155,0.07);
  animation: fadeIn 0.5s ease forwards;
}
.collection-entry:last-child { border-bottom: none; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.col-poem-title {
  font-style: italic; font-size: 0.72rem;
  color: rgba(200,148,58,0.45); letter-spacing: 0.15em;
  margin-bottom: 0.4rem;
}
.col-poem-line {
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  line-height: 2; color: rgba(228,218,192,0.75); letter-spacing: 0.03em;
}
.col-poem-line em { color: #f0c84a; font-style: italic; }
.col-attribution {
  margin-top: 0.4rem;
  font-style: italic; font-size: 0.7rem;
  color: rgba(200,188,155,0.22); letter-spacing: 0.1em;
}

.collection-empty {
  text-align: center; font-style: italic; font-size: 1rem;
  color: rgba(200,188,155,0.2); padding: 3rem 0; letter-spacing: 0.08em;
}

.col-nav { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
.col-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(200,148,58,0.12);
  border: 1px solid rgba(200,148,58,0.25);
  transition: background 0.3s;
}
.col-dot.found { background: rgba(200,148,58,0.55); }
</style>
</head>

  <div id="poem-box">

    <div id="btn-row">

  </div>
</div>

<div id="collection-panel">
  <div id="collection-inner">
    <div id="collection-header">
      <h2>gathered poems</h2>
      <div style="display:flex;gap:1rem;align-items:baseline;">
        <button id="btn-seek-from-collection">seek</button>

      </div>
    </div>
    <div class="col-nav" id="col-nav"></div>
    <div id="collection-scroll">

</div>

    hidden = poem.words.map(function (pw, i) {
      return {
        idx: i, word: pw.word, hint: pw.hint,
        x: (0.1 + Math.random() * 0.8) * W,
        y: (0.07 + Math.random() * 0.72) * H,
        found: false, hovered: false
      };
    });
  }

  function drawBg() {
    var g = ctx.createRadialGradient(W*0.5, 0, 0, W*0.5, H*0.4, H);
    g.addColorStop(0,   '#0b1525');
    g.addColorStop(0.6, '#060a16');
    g.addColorStop(1,   '#02030b');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    var mw = ctx.createLinearGradient(W*0.25, 0, W*0.75, H);
    mw.addColorStop(0,   'rgba(70,90,150,0)');
    mw.addColorStop(0.5, 'rgba(70,90,150,0.05)');
    mw.addColorStop(1,   'rgba(70,90,150,0)');
    ctx.fillStyle = mw; ctx.fillRect(0, 0, W, H);
    var hz = ctx.createLinearGradient(0, H*0.8, 0, H);
    hz.addColorStop(0, 'rgba(2,3,11,0)');
    hz.addColorStop(1, 'rgba(2,3,11,1)');
    ctx.fillStyle = hz; ctx.fillRect(0, 0, W, H);
  }

  function drawBgStar(s, t) {
    var tw = 0.65 + 0.35 * Math.sin(t * s.sp + s.ph);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28);
    ctx.fillStyle = 'rgba(215,210,192,' + (s.b * tw) + ')'; ctx.fill();
  }

  function drawHidden(s) {
    var col   = s.found   ? '125,198,125' : '208,172,75';
    var gSize = s.hovered ? 22 : (s.found ? 12 : 10);
    var gA    = s.found   ? 0.22 : (s.hovered ? 0.55 : 0.36);
    var cSize = s.hovered ? 3.8  : (s.found ? 2.5 : 2.9);
    var g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, gSize);
    g.addColorStop(0, 'rgba(' + col + ',' + gA + ')');
    g.addColorStop(1, 'rgba(' + col + ',0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(s.x, s.y, gSize, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x, s.y, cSize, 0, 6.28);
    ctx.fillStyle = s.found ? 'rgba(155,228,155,0.75)' : (s.hovered ? 'rgba(255,226,105,1)' : 'rgba(235,206,90,0.9)');
    ctx.fill();
    if (!s.found) {
      var len = s.hovered ? 8 : 5;
      ctx.strokeStyle = s.hovered ? 'rgba(255,226,105,0.5)' : 'rgba(235,206,90,0.27)';
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
      ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
      ctx.stroke();
    }
  }

  function loop(ts) {
    var t = ts / 1000;
    ctx.clearRect(0, 0, W, H);
    drawBg();
    for (var i = 0; i < bgStars.length; i++) drawBgStar(bgStars[i], t);
    for (var j = 0; j < hidden.length;  j++) drawHidden(hidden[j]);
    requestAnimationFrame(loop);
  }

  function hit(mx, my) {
    for (var i = 0; i < hidden.length; i++) {
      var s = hidden[i];
      if (s.found) continue;
      var dx = s.x - mx, dy = s.y - my;
      if (Math.sqrt(dx*dx + dy*dy) < 20) return s;
    }
    return null;
  }

  canvas.addEventListener('mousemove', function (e) {
    if (overlayOpen || collectionOpen) return;
    var h = hit(e.clientX, e.clientY);
    for (var i = 0; i < hidden.length; i++) hidden[i].hovered = false;
    if (h) h.hovered = true;
    document.getElementById('hint').textContent = h ? h.hint : '';
    canvas.style.cursor = h ? 'pointer' : 'default';
  });

  canvas.addEventListener('click', function (e) {
    if (overlayOpen || collectionOpen) return;
    discover(hit(e.clientX, e.clientY));
  });

  canvas.addEventListener('touchstart', function (e) {
    if (overlayOpen || collectionOpen) return;
    e.preventDefault();
    var t = e.touches[0];
    discover(hit(t.clientX, t.clientY));
  }, { passive: false });

  function discover(s) {
    if (!s) return;
    s.found = true; s.hovered = false;
    found.push(s.idx);
    document.getElementById('hint').textContent = '';
    updateCounter();
    floatWord(s.x, s.y, s.word);
    if (found.length === POEMS[currentPoemIdx].words.length) setTimeout(showPoem, 1200);
  }

  function updateCounter() {
    document.getElementById('counter').textContent = found.length + ' / ' + POEMS[currentPoemIdx].words.length;
  }

  function floatWord(x, y, word) {
    var el = document.createElement('div');
    el.className = 'float-word';
    el.textContent = word;
    el.style.left = x + 'px';
    el.style.top  = (y - 6) + 'px';
    document.body.appendChild(el);
    setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 1900);
  }

  function showPoem() {
    overlayOpen = true;
    var poem = POEMS[currentPoemIdx];
    var container = document.getElementById('poem-lines');
    container.innerHTML = '';
    poem.lines.forEach(function (parts, li) {
      var div = document.createElement('div');
      div.className = 'pline';
      div.innerHTML = parts.map(function (p) {
        return p.pre + '<em>' + poem.words[p.i].word + '</em>' + p.post;
      }).join(' ');
      container.appendChild(div);
      setTimeout(function () { div.classList.add('show'); }, 700 + li * 850);
    });
    document.getElementById('poem-attribution').textContent = poem.attribution;
    document.getElementById('overlay').classList.add('active');
    if (collectedPoems.indexOf(currentPoemIdx) === -1) {
      collectedPoems.push(currentPoemIdx);
      updateCollectionBadge();
    }
    var nextBtn = document.getElementById('btn-next');
    if (currentPoemIdx < POEMS.length - 1) {
      nextBtn.textContent = 'next poem →';
    } else {
      nextBtn.textContent = 'seek again';
    }
  }

  function closePoem() {
    overlayOpen = false;
    document.getElementById('overlay').classList.remove('active');
  }

  document.getElementById('btn-next').addEventListener('click', function () {
    closePoem();
    if (currentPoemIdx < POEMS.length - 1) { currentPoemIdx++; }
    resetPoem();
  });
  document.getElementById('btn-collection-from-poem').addEventListener('click', function () { closePoem(); openCollection(); });
  document.getElementById('collection-btn').addEventListener('click', openCollection);
  document.getElementById('btn-close-collection').addEventListener('click', closeCollection);
  document.getElementById('btn-seek-from-collection').addEventListener('click', function () { closeCollection(); resetPoem(); });

  function resetPoem() {
    found = []; buildHidden(); updateCounter();
    document.getElementById('poem-title').textContent = POEMS[currentPoemIdx].title;
  }

  function updateCollectionBadge() {
    document.getElementById('col-badge').textContent = collectedPoems.length + ' / ' + POEMS.length;
    renderCollectionNav();
  }

  function openCollection() {
    collectionOpen = true;
    renderCollectionEntries(); renderCollectionNav();
    document.getElementById('collection-panel').classList.add('open');
    canvas.style.cursor = 'default';
    document.getElementById('hint').textContent = '';
  }

  function closeCollection() {
    collectionOpen = false;
    document.getElementById('collection-panel').classList.remove('open');
  }

  function renderCollectionNav() {
    var nav = document.getElementById('col-nav');
    nav.innerHTML = '';
    POEMS.forEach(function (poem, i) {
      var dot = document.createElement('div');
      dot.className = 'col-dot' + (collectedPoems.indexOf(i) !== -1 ? ' found' : '');
      dot.title = poem.title;
      nav.appendChild(dot);
    });
  }

  function renderCollectionEntries() {
    var container = document.getElementById('collection-entries');
    container.innerHTML = '';
    if (collectedPoems.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'collection-empty';
      empty.textContent = 'no poems gathered yet — seek the stars';
      container.appendChild(empty); return;
    }
    collectedPoems.forEach(function (poemIdx) {
      var poem = POEMS[poemIdx];
      var entry = document.createElement('div');
      entry.className = 'collection-entry';
      var titleEl = document.createElement('div');
      titleEl.className = 'col-poem-title';
      titleEl.textContent = poem.title;
      entry.appendChild(titleEl);
      poem.lines.forEach(function (parts) {
        var lineEl = document.createElement('div');
        lineEl.className = 'col-poem-line';
        lineEl.innerHTML = parts.map(function (p) {
          return p.pre + '<em>' + poem.words[p.i].word + '</em>' + p.post;
        }).join(' ');
        entry.appendChild(lineEl);
      });
      if (poem.attribution) {
        var attr = document.createElement('div');
        attr.className = 'col-attribution';
        attr.textContent = poem.attribution;
        entry.appendChild(attr);
      }
      container.appendChild(entry);
    });
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', function () {
    resize(); buildBg(); buildHidden(); found = []; updateCounter();
  });

  resize(); buildBg(); buildHidden();
  document.getElementById('poem-title').textContent = POEMS[0].title;
  updateCounter(); updateCollectionBadge();
  requestAnimationFrame(loop);

}());
</script>
</body>
</html>
